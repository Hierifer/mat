name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'universal-apple-darwin'
          - platform: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (non-macOS)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust (macOS)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Import Apple Certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access the certificate
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build and sign application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd frontend
          npm run tauri build -- --target ${{ matrix.target }}

      - name: Notarize macOS app (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Find the .app bundle
          APP_PATH=$(find frontend/src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" | head -n 1)

          if [ -n "$APP_PATH" ]; then
            echo "Notarizing app at: $APP_PATH"

            # Create a zip for notarization
            ditto -c -k --keepParent "$APP_PATH" "$APP_PATH.zip"

            # Submit for notarization
            xcrun notarytool submit "$APP_PATH.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            # Staple the notarization ticket
            xcrun stapler staple "$APP_PATH"

            echo "Notarization complete"
          fi

      - name: Clean up keychain (macOS)
        if: always() && matrix.platform == 'macos-latest'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.zip
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.zip.sig
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz.sig
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/latest.json
          draft: false
          prerelease: false
          generate_release_notes: true
