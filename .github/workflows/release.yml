name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'universal-apple-darwin'
          - platform: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (non-macOS)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust (macOS)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build and sign application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd frontend
          npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.zip
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.zip.sig
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz.sig
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/latest.json
          draft: false
          prerelease: false
          generate_release_notes: true
